server:
  port: 9090
  address: 0.0.0.0
  error:
    include-message: always

spring:
  application:
    name: nha-tro-manager

  datasource:
    url: jdbc:h2:file:./data/hotelchain;AUTO_SERVER=TRUE;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password: 
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 3

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

# MinIO
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket-name: ${MINIO_BUCKET:hotel-uploads}

# Logging
logging:
  level:
    com.hotelchain: INFO
    org.hibernate.SQL: WARN
    org.flywaydb: INFO
  file:
    name: logs/nha-tro.log

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info

# SpringDoc OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
  info:
    title: Quản Lý Nhà Trọ API
    version: 1.0.0
    description: API cho hệ thống quản lý nhà trọ — điện, nước, tiền phòng
