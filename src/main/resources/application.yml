spring:
  application:
    name: hotelchain-pro

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:hotelchain}
    username: ${DB_USER:hotelchain}
    password: ${DB_PASSWORD:secret}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_batch_fetch_size: 50
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2
          max-wait: 3000ms

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: /

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain

# JWT Security
security:
  jwt:
    access-token-expiry: 1800        # 30 phút (giây)
    refresh-token-expiry: 604800     # 7 ngày (giây)
    secret: ${JWT_SECRET:hotelchain-pro-super-secret-key-must-be-at-least-256-bits-long-for-hs512}
  admin:
    ip-whitelist: ${ADMIN_IP_WHITELIST:127.0.0.1,::1}

# MinIO
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket-name: ${MINIO_BUCKET:hotel-uploads}

# VietQR Payment
payment:
  vietqr:
    api-url: https://api.vietqr.io/v2
    client-id: ${VIETQR_CLIENT_ID:}
    api-key: ${VIETQR_API_KEY:}

# Notification
notification:
  email:
    from: ${MAIL_FROM:noreply@hotelchain.vn}
    from-name: HotelChain Pro
  sms:
    provider: ${SMS_PROVIDER:ESMS}
    api-key: ${SMS_API_KEY:}
    brand-name: ${SMS_BRAND:HotelChain}
  firebase:
    credentials-file: ${FIREBASE_CREDENTIALS_PATH:}
  zalo:
    oa-token: ${ZALO_OA_TOKEN:}

# Utility Readings
utility:
  photo:
    max-age-minutes: 60
    stale-threshold-minutes: 120
  reading:
    discrepancy-tolerance: 1.0

# Dynamic Pricing
pricing:
  weekend-surge-rate: 1.20
  high-occupancy-threshold: 0.80
  high-occupancy-surge-rate: 1.15

# Rate Limiting
rate-limit:
  login:
    max-attempts-per-ip: 5
    max-attempts-per-username: 3
    window-minutes: 15
  api:
    requests-per-minute: 300

# Logging
logging:
  level:
    com.hotelchain: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.flywaydb: INFO
  file:
    name: logs/hotelchain-pro.log
  logback:
    rollingpolicy:
      max-history: 30
      max-file-size: 100MB

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

# SpringDoc OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
  info:
    title: HotelChain Pro API
    version: 1.0.0
    description: API cho hệ thống quản lý chuỗi khách sạn/nhà nghỉ
